---
layout: default
comments: true
---

<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1> <!-- Judul Post -->
    <p class="post-meta">
      <time datetime="{{ page.date | date: "%Y-%m-%d" }}">
        {{ page.date | date: "%B %d, %Y" }} <!-- Tanggal Post dalam format bulan dan tahun -->
      </time>
    </p>
  </header>

  <div class="markdown-content">
    {{ content }}
  </div>
  
  <!-- Bagian komentar (opsional) -->
  <section class="comments">
    <h2>Comments</h2>
    <div id="disqus_thread"></div>
    <div id="disqus_thread"></div>
<script>
    var disqus_config = function () {
        this.page.url = '{{ page.url | absolute_url }}'; // Ini memberikan URL halaman saat ini
        this.page.identifier = '{{ page.id }}'; // Ganti dengan ID unik untuk halaman
    };

    (function() { // JANGAN EDIT DI BAWAH GARIS INI
        var d = document, s = d.createElement('script');
        s.src = 'https://testing-w2sa9mqj2y.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
    })();
</script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

  </section>
</article>
