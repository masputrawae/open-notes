<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Metadata dasar untuk pengaturan karakter dan responsivitas -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Judul halaman, menggabungkan judul halaman dengan judul situs -->
  <title>{{ page.title }} - {{ site.title }}</title>
  
  <!-- Menambahkan favicon dan ikon untuk tab browser -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/favicons/apple-touch-icon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicons/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicons/favicon-16x16.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/images/favicons/site.webmanifest' | relative_url }}">
  
  <!-- Menghubungkan stylesheet utama -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"> <!-- CSS UTAMA -->
  <link rel="stylesheet" href="{{ '/assets/css/markdown.css' | relative_url }}"> <!-- CSS Markdown -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome untuk ikon -->
</head>
<body>
  
  <div class="container">
    <!-- Sidebar navigasi utama yang memanjang dari atas hingga bawah -->
    <aside class="main-menu">
      <!-- Bagian header yang menampilkan judul situs dan subtitle -->
      <header class="site-header">
        <h1>{{ site.title }}</h1> <!-- Judul situs -->
        <h2>Welcome to my blog</h2> <!-- Subtitle -->
      </header>
      
      <!-- Logo situs yang dapat diklik untuk kembali ke halaman utama -->
      <div class="logo">
        <a href="{{ '/' | relative_url }}">
          <img src="{{ '/assets/images/logo.jpeg' | relative_url }}" alt="Logo dari {{ site.title }}"> <!-- Gambar logo -->
        </a>
      </div>
      
      <!-- Menu navigasi utama -->
      <h3>Main Menu</h3> <!-- Menggunakan <h3> untuk menjaga hierarki heading -->
      <nav aria-label="Main navigation">
        <ul>
          <!-- Daftar tautan navigasi -->
          <li><a href="{{ '/' | relative_url }}"><i class="fas fa-home"></i> Home</a></li>
          <li><a href="{{ '/articles/' | relative_url }}"><i class="fas fa-file-alt"></i> Articles</a></li>
          <li><a href="{{ '/categories/' | relative_url }}"><i class="fas fa-th-list"></i> Categories</a></li>
          <li><a href="{{ '/tags/' | relative_url }}"><i class="fas fa-tags"></i> Tags</a></li>
          <li><a href="{{ '/archives/' | relative_url }}"><i class="fas fa-archive"></i> Archives</a></li>
          <li><a href="{{ '/social/' | relative_url }}"><i class="fas fa-users"></i> Social</a></li>
          <li><a href="{{ '/about/' | relative_url }}"><i class="fas fa-info-circle"></i> About</a></li>
          <li><a href="{{ '/contact/' | relative_url }}"><i class="fas fa-envelope"></i> Contact</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Konten utama yang menampilkan halaman atau postingan -->
    <main class="content">
      <!-- Search bar untuk mencari konten di situs -->
      <div class="search-bar">
        <form action="{{ '/search/' | relative_url }}" method="get" role="search">
          <!-- Input teks untuk pencarian -->
          <input type="text" name="q" placeholder="Search..." aria-label="Search">
          <!-- Tombol untuk mengirimkan pencarian -->
          <button type="submit" aria-label="Submit search"><i class="fas fa-search"></i></button>
        </form>
      </div>

      {{ content }} <!-- Tempat untuk konten halaman/post -->
    </main>
  </div>

  <!-- Bagian footer yang menampilkan informasi hak cipta -->
  <footer class="footer">
    <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p> <!-- Informasi hak cipta -->
  </footer>
  
  <!-- Menghubungkan file JavaScript -->
  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
